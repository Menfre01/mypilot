name: Feature Request
description: Suggest a feature for MyPilot
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use case
      description: What problem does this feature solve? Or what scenario does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your ideal solution. Mockups or screenshots are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried.
    validations:
      required: false
