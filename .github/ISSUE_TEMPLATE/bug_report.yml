name: Bug Report
description: Report a bug for the MyPilot gateway or iOS app
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of MyPilot is affected?
      options:
        - Gateway (CLI / server)
        - iOS App
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run `mypilot start`
        2. Open the MyPilot app
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include logs or screenshots if possible.
      placeholder: |
        - Gateway log (if applicable): `~/.mypilot/logs/events-*.jsonl`
        - Screenshots from the iOS app
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Help us reproduce the issue. Fill in what's relevant.
      value: |
        - MyPilot version:
        - Node.js version:
        - iOS version:
        - Claude Code version:
        - Connection: [Local LAN / Tunnel (frp, ngrok, etc.)]
    validations:
      required: false
