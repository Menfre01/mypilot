<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3478F6"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
    <clipPath id="win">
      <rect x="122" y="172" width="780" height="680" rx="48"/>
    </clipPath>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#0a0a1a" flood-opacity="0.30"/>
    </filter>
    <linearGradient id="codeHL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3478F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5E5CE6" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle grid pattern for texture -->
  <g opacity="0.04">
    <line x1="256" y1="0" x2="256" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="1024" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="white" stroke-width="1"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="white" stroke-width="1"/>
  </g>

  <!-- Window body -->
  <rect x="122" y="172" width="780" height="680" rx="48" fill="white" filter="url(#sh)"/>

  <!-- Title bar -->
  <g clip-path="url(#win)">
    <rect x="122" y="172" width="780" height="108" fill="#F7F7FA"/>
    <line x1="122" y1="280" x2="902" y2="280" stroke="#E8E8ED" stroke-width="1.5"/>

    <!-- Traffic lights -->
    <circle cx="196" cy="226" r="18" fill="#FF5F57"/>
    <circle cx="254" cy="226" r="18" fill="#FEBC2E"/>
    <circle cx="312" cy="226" r="18" fill="#28C840"/>

    <!-- Window title -->
    <text x="512" y="234" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="28" fill="#8E8E93" text-anchor="middle" font-weight="500">MyPilot</text>
  </g>

  <!-- Code area -->
  <g clip-path="url(#win)">
    <!-- Line number gutter -->
    <rect x="122" y="280" width="60" height="572" fill="#FAFAFC"/>

    <!-- Line numbers -->
    <g font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="22" fill="#C6C6C8" text-anchor="end">
      <text x="170" y="355">1</text>
      <text x="170" y="425">2</text>
      <text x="170" y="495">3</text>
      <text x="170" y="565">4</text>
      <text x="170" y="635">5</text>
      <text x="170" y="705">6</text>
      <text x="170" y="775">7</text>
    </g>

    <!-- Active line highlight -->
    <rect x="122" y="460" width="780" height="66" fill="url(#codeHL)"/>

    <!-- Prompt chevron > on line 1 -->
    <polygon points="202,326 248,352 202,378" fill="#3478F6"/>

    <!-- Code line 1 - with blue highlight -->
    <rect x="268" y="336" width="420" height="32" rx="6" fill="#E4EAFF"/>

    <!-- Code line 2 -->
    <rect x="202" y="406" width="560" height="32" rx="6" fill="#F2F2F7"/>

    <!-- Code line 3 - indented -->
    <rect x="244" y="476" width="380" height="32" rx="6" fill="#F2F2F7"/>

    <!-- Code line 4 - active, with blue accent -->
    <rect x="202" y="546" width="500" height="32" rx="6" fill="#E4EAFF"/>

    <!-- Code line 5 - short -->
    <rect x="202" y="616" width="280" height="32" rx="6" fill="#F2F2F7"/>

    <!-- Code line 6 - indented -->
    <rect x="244" y="686" width="340" height="32" rx="6" fill="#F2F2F7"/>

    <!-- Cursor -->
    <rect x="202" y="752" width="4" height="40" rx="2" fill="#3478F6" opacity="0.8"/>
    <rect x="216" y="758" width="200" height="32" rx="6" fill="#F2F2F7"/>

    <!-- Gutter divider -->
    <line x1="182" y1="280" x2="182" y2="852" stroke="#E8E8ED" stroke-width="1"/>
  </g>

  <!-- Bottom status bar -->
  <g clip-path="url(#win)">
    <rect x="122" y="804" width="780" height="48" fill="#3478F6"/>
    <circle cx="160" cy="828" r="6" fill="#A6E3A1"/>
    <text x="180" y="835" font-family="-apple-system, 'SF Pro Text', sans-serif" font-size="20" fill="white" font-weight="500">Connected</text>
  </g>
</svg>
